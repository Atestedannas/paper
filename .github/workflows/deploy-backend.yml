name: Deploy backend

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-backend
  cancel-in-progress: false

jobs:
  build-test-deploy:
    name: Build, test, and deploy
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    env:
      PROD_HOST: ${{ secrets.PROD_HOST }}
      PROD_PORT: ${{ secrets.PROD_PORT || '22' }}
      PROD_USER: ${{ secrets.PROD_USER }}
      PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
      PROD_DEPLOY_DIR: ${{ vars.PROD_DEPLOY_DIR || '/opt/paper' }}
      PROD_SERVICE_NAME: ${{ vars.PROD_SERVICE_NAME || 'paper.service' }}
      PROD_SERVER_PORT: ${{ vars.PROD_SERVER_PORT || '8002' }}
      PROD_HEALTH_URL: ${{ vars.PROD_HEALTH_URL || 'http://127.0.0.1:8002/health' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true

      - name: Test
        run: go test ./internal/middleware ./internal/handler ./internal/service ./cmd/server

      - name: Build Linux binary
        run: |
          mkdir -p output
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o output/paper-server ./cmd/server
          chmod +x output/paper-server scripts/deploy_backend_systemd.sh
          cp scripts/deploy_backend_systemd.sh output/deploy_backend_systemd.sh
          tar -czf output/paper-backend-deploy.tar.gz -C output paper-server deploy_backend_systemd.sh
          ls -lh output/paper-server
          ls -lh output/paper-backend-deploy.tar.gz

      - name: Validate deployment secrets
        run: |
          test -n "$PROD_HOST"
          test -n "$PROD_PORT"
          test -n "$PROD_USER"
          test -n "$PROD_SSH_KEY"

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          timeout 20s ssh-keyscan -p "$PROD_PORT" "$PROD_HOST" >> ~/.ssh/known_hosts || true

      - name: Upload artifact
        run: |
          timeout 180s ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "$PROD_PORT" -i ~/.ssh/deploy_key "$PROD_USER@$PROD_HOST" "cat > /tmp/paper-backend-deploy.tar.gz" < output/paper-backend-deploy.tar.gz

      - name: Deploy with systemd rollback
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "$PROD_PORT" -i ~/.ssh/deploy_key "$PROD_USER@$PROD_HOST" \
            "rm -rf /tmp/paper-backend-deploy && mkdir -p /tmp/paper-backend-deploy && tar -xzf /tmp/paper-backend-deploy.tar.gz -C /tmp/paper-backend-deploy && chmod +x /tmp/paper-backend-deploy/paper-server /tmp/paper-backend-deploy/deploy_backend_systemd.sh && DEPLOY_DIR='$PROD_DEPLOY_DIR' SERVICE_NAME='$PROD_SERVICE_NAME' SERVER_PORT='$PROD_SERVER_PORT' HEALTH_URL='$PROD_HEALTH_URL' /tmp/paper-backend-deploy/deploy_backend_systemd.sh /tmp/paper-backend-deploy/paper-server"
