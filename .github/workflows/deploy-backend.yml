name: Deploy backend

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-backend
  cancel-in-progress: false

jobs:
  build-test-deploy:
    name: Build, test, and deploy
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 70

    env:
      PROD_HOST: ${{ secrets.PROD_HOST }}
      PROD_PORT: ${{ secrets.PROD_PORT || '22222' }}
      PROD_USER: ${{ secrets.PROD_USER }}
      PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
      PROD_DEPLOY_DIR: ${{ vars.PROD_DEPLOY_DIR || '/opt/paper' }}
      PROD_SERVICE_NAME: ${{ vars.PROD_SERVICE_NAME || 'paper.service' }}
      PROD_SERVER_PORT: ${{ vars.PROD_SERVER_PORT || '8002' }}
      PROD_HEALTH_URL: ${{ vars.PROD_HEALTH_URL || 'http://127.0.0.1:8002/health' }}
      PROD_HEALTH_RETRIES: ${{ vars.PROD_HEALTH_RETRIES || '60' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true

      - name: Test
        run: go test ./internal/middleware ./internal/handler ./internal/service ./cmd/server

      - name: Build Linux binary
        run: |
          mkdir -p output
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o output/paper-server ./cmd/server
          chmod +x output/paper-server scripts/deploy_backend_systemd.sh
          cp scripts/deploy_backend_systemd.sh output/deploy_backend_systemd.sh
          tar -cf - -C output paper-server deploy_backend_systemd.sh | gzip -9 > output/paper-backend-deploy.tar.gz
          ls -lh output/paper-server
          ls -lh output/paper-backend-deploy.tar.gz

      - name: Validate deployment secrets
        run: |
          missing=0
          for name in PROD_HOST PROD_PORT PROD_USER PROD_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing deployment secret::$name is not configured"
              missing=1
            fi
          done
          test "$missing" -eq 0

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub || {
            echo "::error title=Invalid deployment SSH key::PROD_SSH_KEY must be an unencrypted private key accepted by ssh."
            exit 1
          }
          echo "[deploy] ssh key fingerprint: $(ssh-keygen -lf ~/.ssh/deploy_key.pub)"
          timeout 20s ssh-keyscan -p "$PROD_PORT" "$PROD_HOST" >> ~/.ssh/known_hosts || true

      - name: Verify SSH connectivity
        run: |
          ssh -v -o BatchMode=yes -o PreferredAuthentications=publickey -o PasswordAuthentication=no -o ConnectTimeout=20 -o ConnectionAttempts=2 -o ServerAliveInterval=10 -o ServerAliveCountMax=3 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "$PROD_PORT" -i ~/.ssh/deploy_key "$PROD_USER@$PROD_HOST" \
            "set -e; echo '[deploy] ssh connected'; mkdir -p /tmp; test -w /tmp"

      - name: Upload artifact
        run: |
          timeout 600s ssh \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p "$PROD_PORT" \
            -i ~/.ssh/deploy_key \
            "$PROD_USER@$PROD_HOST" \
            "cat > /tmp/paper-backend-deploy.tar.gz" \
            < output/paper-backend-deploy.tar.gz

      - name: Deploy with systemd rollback
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=30 -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "$PROD_PORT" -i ~/.ssh/deploy_key "$PROD_USER@$PROD_HOST" \
            "rm -rf /tmp/paper-backend-deploy && mkdir -p /tmp/paper-backend-deploy && tar -xzf /tmp/paper-backend-deploy.tar.gz -C /tmp/paper-backend-deploy && chmod +x /tmp/paper-backend-deploy/paper-server /tmp/paper-backend-deploy/deploy_backend_systemd.sh && export DEPLOY_DIR='$PROD_DEPLOY_DIR' SERVICE_NAME='$PROD_SERVICE_NAME' SERVER_PORT='$PROD_SERVER_PORT' HEALTH_URL='$PROD_HEALTH_URL' HEALTH_RETRIES='$PROD_HEALTH_RETRIES'; if [ \"\$(id -u)\" -eq 0 ]; then /tmp/paper-backend-deploy/deploy_backend_systemd.sh /tmp/paper-backend-deploy/paper-server; elif command -v sudo >/dev/null 2>&1 && sudo -n true; then sudo -n env DEPLOY_DIR=\"\$DEPLOY_DIR\" SERVICE_NAME=\"\$SERVICE_NAME\" SERVER_PORT=\"\$SERVER_PORT\" HEALTH_URL=\"\$HEALTH_URL\" HEALTH_RETRIES=\"\$HEALTH_RETRIES\" /tmp/paper-backend-deploy/deploy_backend_systemd.sh /tmp/paper-backend-deploy/paper-server; else echo '[deploy][ERROR] remote user must be root or have passwordless sudo for systemd deployment' >&2; exit 1; fi"
